<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Media Portfolio</title>
  
  <!-- Embedded Styling -->
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1f2833;
      --text-color: #c5a059;
      --text-muted: #868e96;
      --accent-color: #45f3ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 3rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 4rem;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Automated Responsive Layout Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Clickable Card Items */
    .gallery-item {
      background-color: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
    }

    .gallery-item:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 0 2px var(--accent-color);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Overlay Lightbox Modals */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(5, 5, 5, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 2rem;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .lightbox.active img {
      transform: scale(1);
    }

    .close-btn {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 3.5rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.2s ease;
    }

    .close-btn:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <header>
    <h1>Gallery Registry</h1>
    <p>Zero-maintenance asset display pipeline</p>
  </header>

  <main>
    <div id="gallery-grid" class="gallery-grid"></div>
  </main>

  <!-- Interactive Fullscreen Lightbox Overlay -->
  <div id="lightbox" class="lightbox">
    <button class="close-btn" id="close-lightbox">&times;</button>
    <img id="lightbox-img" src="" alt="View Preview" />
  </div>

  <!-- Embedded Dynamic Code Script -->
  <script type="module">
    // 1. Scan the local folder directory and fetch files directly via Vite bundling
    const imageModules = import.meta.glob('./gltf/texture/*.{png,jpg,jpeg,webp}', { eager: true });
    
    const container = document.getElementById('gallery-grid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn = document.getElementById('close-lightbox');

    // 2. Map structural components out automatically
    Object.keys(imageModules).forEach((path) => {
      const resolvedSrc = imageModules[path].default || imageModules[path];
      
      const itemCard = document.createElement('div');
      itemCard.className = 'gallery-item';
      
      const thumbnail = document.createElement('img');
      thumbnail.src = resolvedSrc;
      thumbnail.alt = path.split('/').pop();
      thumbnail.loading = 'lazy'; // Optimizes render performance
      
      itemCard.addEventListener('click', () => {
        lightboxImg.src = resolvedSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
      
      itemCard.appendChild(thumbnail);
      container.appendChild(itemCard);
    });

    // 3. User Interface Controls
    const dismissPreview = () => {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => { lightboxImg.src = ''; }, 250);
    };

    closeBtn.addEventListener('click', dismissPreview);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) dismissPreview(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') dismissPreview(); });
  </script>

</body>
</html>
