<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klumsy Kat</title>
    <link rel="stylesheet" href="styleTest.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">Loading Workspace...</div>
    </div>

    <div id="canvas-container"></div>

    <button id="menu-toggle-open" class="floating-trigger" aria-label="Open Textures Menu">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/>
        </svg>
    </button>

    <div id="sidebar" class="floating-card show">
        <div class="sidebar-header">
            <div class="header-main">
                <h2>Klumsy Kat 31 May 2026</h2>
                <div id="counter" class="badge">0 Textures Loaded</div>
            </div>
            <button id="menu-toggle-close" class="close-trigger" aria-label="Close Menu">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/>
                </svg>
            </button>
        </div>
        <ul id="texture-list"></ul>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
